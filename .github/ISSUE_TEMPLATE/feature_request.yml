name: ✨ 功能建议
description: 想给项目提一个新功能或改进
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        有新想法？欢迎提出来！
  - type: textarea
    id: problem
    attributes:
      label: 🎯 解决什么问题
      description: 这个功能解决了什么痛点？描述你遇到的场景
      placeholder: 每次都要手动做 xxx，很麻烦...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 💡 期望的方案
      description: 你理想中的解决方案是什么样的？
      placeholder: 希望加一个按钮，点了就能自动 xxx
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 考虑过的替代方案
      description: 你还想过其他实现方式吗？
  - type: checkboxes
    id: confirm
    attributes:
      label: ✅ 确认
      options:
        - label: 我已搜索过已有 Issues，没有重复的建议
          required: true
